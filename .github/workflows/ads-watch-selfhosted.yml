# Fully autonomous ads watch — runs on YOUR Windows PC (self-hosted runner).
# One-time setup: scripts/install-selfhosted-runner.ps1 + npm run login
# Then: Actions → "Etsy Ads Watch (Autonomous)" → Run workflow — no session:prepare needed.

name: Etsy Ads Watch (Autonomous)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ads-watch-selfhosted
  cancel-in-progress: false

jobs:
  watch:
    runs-on: [self-hosted, Windows, ads-watch]
    timeout-minutes: 360

    defaults:
      run:
        working-directory: etsy-offsite-ads
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Write .env from secrets
        env:
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          PRINTIFY_EMAIL: ${{ secrets.PRINTIFY_EMAIL }}
          PRINTIFY_PASSWORD: ${{ secrets.PRINTIFY_PASSWORD }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          OFFSITE_ADS_ENABLED: ${{ vars.OFFSITE_ADS_ENABLED }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_USER: ${{ secrets.MAIL_SMTP_USER }}
          MAIL_SMTP_PASS: ${{ secrets.MAIL_SMTP_PASS }}
        run: |
          $offsite = if ($env:OFFSITE_ADS_ENABLED) { $env:OFFSITE_ADS_ENABLED } else { 'false' }
          @"
          PRINTIFY_API_KEY=$env:PRINTIFY_API_KEY
          PRINTIFY_EMAIL=$env:PRINTIFY_EMAIL
          PRINTIFY_PASSWORD=$env:PRINTIFY_PASSWORD
          PRINTIFY_SHOP_ID=$env:PRINTIFY_SHOP_ID
          OFFSITE_ADS_ENABLED=$offsite
          PLAYWRIGHT_USE_PROFILE=true
          PLAYWRIGHT_PREFER_SESSION=false
          PLAYWRIGHT_HEADLESS=true
          PRINTIFY_NAV_VIA_PRODUCTS=true
          ADS_WATCH_RETRY_FAILED=true
          ADS_WATCH_ALLOW_LOGIN=true
          ADS_WATCH_AUTO_RELOGIN=true
          ADS_WATCH_SELF_HOSTED=true
          MAIL_TO=$env:MAIL_TO
          MAIL_FROM=$env:MAIL_FROM
          SENDGRID_API_KEY=$env:SENDGRID_API_KEY
          MAIL_SMTP_HOST=$env:MAIL_SMTP_HOST
          MAIL_SMTP_PORT=$env:MAIL_SMTP_PORT
          MAIL_SMTP_USER=$env:MAIL_SMTP_USER
          MAIL_SMTP_PASS=$env:MAIL_SMTP_PASS
          "@ | Set-Content -Path .env -Encoding utf8

      - name: Verify Printify session (persistent profile)
        id: verify
        continue-on-error: true
        run: |
          $env:PLAYWRIGHT_VERIFY_MODE = 'profile'
          $env:ADS_WATCH_SELF_HOSTED = 'true'
          $env:VERIFY_PRODUCT_ID = node scripts/pickVerifyProductId.js
          Write-Host "Verify product: $env:VERIFY_PRODUCT_ID"
          node scripts/verifySession.js

      - name: Auto-login if profile session missing
        if: failure() && steps.verify.outcome == 'failure'
        run: npm run login

      - name: Run ads watch
        run: node src/adsWatch.js
