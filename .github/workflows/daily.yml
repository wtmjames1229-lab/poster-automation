name: Daily Snoopy automation
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install sharp dotenv
      - run: node automation.js
        env:
          NB_API_KEY: ${{ secrets.NB_API_KEY }}
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          ETSY_ACCESS_TOKEN: ${{ secrets.ETSY_ACCESS_TOKEN }}
          ETSY_REFRESH_TOKEN: ${{ secrets.ETSY_REFRESH_TOKEN }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_SHARED_SECRET: ${{ secrets.ETSY_SHARED_SECRET }}
          PRINTIFY_SHOP_ID: '18634010'
          PRINTIFY_EMAIL: ${{ secrets.PRINTIFY_EMAIL }}
          PRINTIFY_PASSWORD: ${{ secrets.PRINTIFY_PASSWORD }}
                    PRINTIFY_SESSION_TOKEN: ${{ secrets.PRINTIFY_SESSION_TOKEN }}
          TOGGLE_ALL_ETSY_PUBLISHED: 'false'
          OFFSITE_ADS_ENABLED: 'false'
