# Cloud CI — requires periodic npm run session:prepare (Printify captcha blocks datacenter IPs).
# For fully autonomous "Run workflow": use ads-watch-selfhosted.yml on your PC instead.
# Secrets: https://github.com/wtmjames1229-lab/poster-automation/settings/secrets/actions

name: Etsy Ads Watch

on:
  workflow_dispatch:

concurrency:
  group: ads-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    defaults:
      run:
        working-directory: etsy-offsite-ads

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          for key in PRINTIFY_API_KEY PRINTIFY_EMAIL PRINTIFY_PASSWORD PRINTIFY_SHOP_ID PRINTIFY_SESSION_JSON MAIL_TO; do
            val="${!key}"
            if [ -z "$val" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            echo "Add them at: https://github.com/wtmjames1229-lab/poster-automation/settings/secrets/actions"
            echo "For PRINTIFY_SESSION_JSON run locally: cd etsy-offsite-ads && npm run session:export && npm run session:github"
            exit 1
          fi
        env:
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          PRINTIFY_EMAIL: ${{ secrets.PRINTIFY_EMAIL }}
          PRINTIFY_PASSWORD: ${{ secrets.PRINTIFY_PASSWORD }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          PRINTIFY_SESSION_JSON: ${{ secrets.PRINTIFY_SESSION_JSON }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: etsy-offsite-ads/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Write .env from secrets
        env:
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          PRINTIFY_EMAIL: ${{ secrets.PRINTIFY_EMAIL }}
          PRINTIFY_PASSWORD: ${{ secrets.PRINTIFY_PASSWORD }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          OFFSITE_ADS_ENABLED: ${{ vars.OFFSITE_ADS_ENABLED }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_USER: ${{ secrets.MAIL_SMTP_USER }}
          MAIL_SMTP_PASS: ${{ secrets.MAIL_SMTP_PASS }}
        run: |
          OFFSITE="${OFFSITE_ADS_ENABLED:-false}"
          {
            echo "PRINTIFY_API_KEY=${PRINTIFY_API_KEY}"
            echo "PRINTIFY_EMAIL=${PRINTIFY_EMAIL}"
            echo "PRINTIFY_PASSWORD=${PRINTIFY_PASSWORD}"
            echo "PRINTIFY_SHOP_ID=${PRINTIFY_SHOP_ID}"
            echo "OFFSITE_ADS_ENABLED=${OFFSITE}"
            echo "PLAYWRIGHT_USE_PROFILE=false"
            echo "PLAYWRIGHT_PREFER_SESSION=true"
            echo "PLAYWRIGHT_HEADLESS=true"
            echo "ADS_WATCH_ALLOW_LOGIN=false"
            echo "PRINTIFY_NAV_VIA_PRODUCTS=true"
            echo "ADS_WATCH_RETRY_FAILED=true"
            echo "MAIL_TO=${MAIL_TO}"
            echo "MAIL_FROM=${MAIL_FROM}"
            echo "SENDGRID_API_KEY=${SENDGRID_API_KEY}"
            echo "MAIL_SMTP_HOST=${MAIL_SMTP_HOST}"
            echo "MAIL_SMTP_PORT=${MAIL_SMTP_PORT}"
            echo "MAIL_SMTP_USER=${MAIL_SMTP_USER}"
            echo "MAIL_SMTP_PASS=${MAIL_SMTP_PASS}"
          } > .env

      - name: Restore Printify session
        env:
          PRINTIFY_SESSION_JSON: ${{ secrets.PRINTIFY_SESSION_JSON }}
        run: |
          node << 'NODE'
          const fs = require('fs');
          const raw = process.env.PRINTIFY_SESSION_JSON || '';
          if (!raw.trim() || raw.trim() === '-') {
            console.error('PRINTIFY_SESSION_JSON is empty or invalid (re-run: npm run session:github)');
            process.exit(1);
          }
          if (!raw.trim().startsWith('{')) {
            console.error('PRINTIFY_SESSION_JSON must be JSON — run: npm run session:github');
            process.exit(1);
          }
          fs.writeFileSync('printify_session.json', raw);
          const j = JSON.parse(raw);
          if (!j.cookies || !j.cookies.length) {
            console.error('No cookies in session — run: npm run session:github');
            process.exit(1);
          }
          console.log(`Session OK (${raw.length} chars, ${j.cookies.length} cookies)`);
          NODE

      - name: Restore watch state (previous runs)
        uses: actions/cache/restore@v4
        with:
          path: etsy-offsite-ads/data/ads-watch-state.json
          key: ads-watch-state-${{ secrets.PRINTIFY_SHOP_ID }}-v1
          restore-keys: |
            ads-watch-state-${{ secrets.PRINTIFY_SHOP_ID }}-

      - name: Verify Printify session (Playwright)
        env:
          PLAYWRIGHT_VERIFY_MODE: session
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          PRINTIFY_NAV_VIA_PRODUCTS: 'true'
        run: |
          VERIFY_PRODUCT_ID=$(node scripts/pickVerifyProductId.js)
          echo "Verify product: $VERIFY_PRODUCT_ID"
          export VERIFY_PRODUCT_ID
          node scripts/verifySession.js

      - name: Dry-run queue (log only)
        run: node src/adsWatch.js --dry-run
        continue-on-error: true

      - name: Run ads watch
        run: node src/adsWatch.js

      - name: Save watch state for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: etsy-offsite-ads/data/ads-watch-state.json
          key: ads-watch-state-${{ secrets.PRINTIFY_SHOP_ID }}-v1

      - name: Upload watch logs (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ads-watch-logs-${{ github.run_id }}
          path: |
            etsy-offsite-ads/data/ads-watch-state.json
            etsy-offsite-ads/data/ads-watch-job.json
          if-no-files-found: ignore
          retention-days: 14
