services:
  etsy-ads-watch:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ${ETSY_ADS_ENV_FILE:-/var/lib/etsy-ads/.env}
    volumes:
      - etsy-ads-data:/data
    restart: unless-stopped
    # Run watch once at start; use host cron/systemd to re-invoke, or:
    # docker compose run --rm etsy-ads-watch node src/adsWatch.js

volumes:
  etsy-ads-data:
    driver: local
